steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/rag-repo/api:$COMMIT_SHA', '-f', 'docker/Dockerfile.api', '.']
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/rag-repo/api:$COMMIT_SHA']
    
  - name: 'gcr.io/cloud-builders/docker'
    args: ['run', '-e', 'POSTGRES_URL=$$POSTGRES_URL', 'us-central1-docker.pkg.dev/$PROJECT_ID/rag-repo/api:$COMMIT_SHA', 'alembic', 'upgrade', 'head']
    secretEnv: ['POSTGRES_URL']
    
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: kubectl
    args: ['apply', '-f', 'k8s/']
    env:
    - 'CLOUDSDK_COMPUTE_ZONE=us-central1'
    - 'CLOUDSDK_CONTAINER_CLUSTER=enterprise-rag-cluster'

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/POSTGRES_URL/versions/latest
    env: 'POSTGRES_URL'
