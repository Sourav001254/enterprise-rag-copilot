apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migration
  namespace: rag-system
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    spec:
      containers:
      - name: migration
        image: us-central1-docker.pkg.dev/your-project/rag-repo/api:latest
        command: ["alembic", "upgrade", "head"]
        envFrom:
          - secretRef:
              name: rag-secrets
      restartPolicy: Never
  backoffLimit: 2
