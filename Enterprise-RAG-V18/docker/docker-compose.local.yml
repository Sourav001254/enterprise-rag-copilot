version: '3.8'

services:
  api:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URL=postgresql+asyncpg://postgres:postgres@db:5432/rag_db
      - QDRANT_URL=http://qdrant:6333
      - UPSTASH_REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      migration:
        condition: service_completed_successfully

  migration:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    command: alembic upgrade head
    environment:
      - POSTGRES_URL=postgresql+asyncpg://postgres:postgres@db:5432/rag_db
    depends_on:
      db:
        condition: service_healthy

  streamlit:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    command: streamlit run app/chat_ui.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

  admin:
    build:
      context: ../
      dockerfile: docker/Dockerfile.api
    command: streamlit run app/admin_dashboard.py --server.port=8502 --server.address=0.0.0.0
    ports:
      - "8502:8502"
    environment:
      - POSTGRES_URL=postgresql+asyncpg://postgres:postgres@db:5432/rag_db
    depends_on:
      - api

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rag_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
